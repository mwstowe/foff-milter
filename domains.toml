# FOFF Milter Domain Registry
# Single source of truth for all domain classifications.
# Categories are not mutually exclusive — a domain can appear in multiple lists.

[esp]
# Trusted ESPs get authentication bypass and score reduction
trusted = [
    "sendgrid.net", "sendgrid.com", "sendgrid.info",
    "mailgun.org", "mailgun.com",
    "mailchimp.com", "mcsv.net", "mcdlv.net", "rsgsv.net", "list-manage.com", "mailchimpapp.com",
    "amazonses.com", "ses.amazonaws.com",
    "sparkpostmail.com", "sparkpost.com", "spmailtechno.com", "sparkpostmail2.com",
    "klaviyomail.com", "klaviyodns.com",
    "salesforce.com", "pd25.com", "exacttarget.com", "pardot.com",
    "cjm.adobe.com", "cname.cjm.adobe.com",
    "bmsend.com", "14westmail.net", "emsend1.com",
    "postmarkapp.com", "mandrill.com", "mandrillapp.com",
    "mailjet.com", "sendinblue.com",
]
# Known ESPs that are legitimate but lower trust
known = [
    "constantcontact.com", "ccsend.com", "ctctcdn.com",
    "campaignmonitor.com", "createsend.com",
    "aweber.com", "getresponse.com", "convertkit.com",
    "activecampaign.com", "drip.com",
    "hubspot.com", "marketo.com", "eloqua.com",
    "emailsp.net", "musvc.com", "mailin.fr",
    "salesmanago.com",
    "narvar.com",
    "oracleemaildelivery.com",
]
# Return-Path patterns that indicate ESP infrastructure
return_path_patterns = [
    "rsgsv.net", "mcsv.net", "mcdlv.net", "list-manage.com",
    "ccsend.com", "sendgrid.net", "sparkpostmail.com",
]

[consumer_email]
domains = [
    "gmail.com", "googlemail.com",
    "outlook.com", "hotmail.com", "live.com",
    "yahoo.com",
    "aol.com",
    "icloud.com", "me.com", "mac.com",
    "mail.com",
    "protonmail.com",
    "zoho.com",
]

[brands]
# Brand name -> legitimate domains mapping
# Used for brand impersonation detection

[brands.starbucks]
domains = ["starbucks.com", "starbucks.co.uk"]
patterns = ['(?i)\bstarbucks?\b']

[brands.amazon]
domains = ["amazon.com", "amazon.co.uk", "amazon.co.jp", "amazonmusic.com", "aws.com", "amazonses.com"]
patterns = ['(?i)\bamazon\b', 'アマゾン']

[brands.americanexpress]
domains = ["americanexpress.com", "aexp.com"]
patterns = ['(?i)\bamerican\s*express\b', '(?i)\bamex\b', 'アメリカン・エキスプレス']

[brands.paypal]
domains = ["paypal.com", "paypal.me"]
patterns = ['(?i)\bpaypal\b']

[brands.microsoft]
domains = ["microsoft.com", "outlook.com", "live.com"]
patterns = ['(?i)\bmicrosoft\b']

[brands.google]
