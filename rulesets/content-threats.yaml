  # Forwarded spam detection
  - name: "Forwarded spam detection"
    enabled: true
    criteria:
      type: "And"
      criteria:
        - type: "SubjectPattern"
          pattern: "(?i)^(fwd?:|re:)\\s*(low\\s*cost|cheap.{0,100}price|best.{0,100}deal|urgent|important|limited.{0,100}time|act.{0,100}now)"
