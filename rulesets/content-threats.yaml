name: "Content Threats"
enabled: true
rules:
  # Health misinformation patterns
  - name: "Health Subject Line Threats"
    criteria:
      type: SubjectPattern
      pattern: "(?i).{0,100}(blood.{0,100}herb|destroys.{0,100}pressure|overnight.{0,100}cure|breathing.{0,100}lung|cardiovascular|coffee.{0,100}weight).*"
    score: 180
  
  - name: "Health Misinformation Detection"
    criteria:
      type: And
      criteria:
        - type: Or
          criteria:
            - type: BodyPattern
              pattern: "(?i).{0,100}(miracle.{0,100}cure|destroys.{0,100}overnight|secret.{0,100}doctors|big.{0,100}pharma.{0,100}hates|one.{0,100}weird.{0,100}trick|doctors.{0,100}shocked).*"
            - type: BodyPattern
              pattern: "(?i).{0,100}(cure.{0,100}diabetes.{0,100}forever|eliminate.{0,100}blood.{0,100}pressure|lose.{0,100}30.{0,100}pounds|ancient.{0,100}remedy|forbidden.{0,100}cure).*"
            - type: SubjectPattern
              pattern: "(?i).{0,100}(blood.{0,100}herb|destroys.{0,100}pressure|overnight.{0,100}cure|miracle.{0,100}diabetes|secret.{0,100}cure).*"
        - type: BodyPattern
          pattern: "(?i).{0,100}(blood.{0,100}pressure|diabetes|a1c|cholesterol|heart.{0,100}disease|weight.{0,100}loss).*"
        - type: Not
          criteria:
            type: SenderPattern
            pattern: ".*@.*(nytimes|washingtonpost|cnn|bbc|reuters|ap|wsj|usatoday)\\.(com|org)$"
    score: 200
    description: "Health misinformation and miracle cure claims"
  
  # Adult content patterns
  - name: "Adult Enhancement Spam"
    criteria:
      type: And
      criteria:
        - type: SubjectPattern
          pattern: "(?i).{0,100}(raging.{0,100}hard|enhancement|enlargement|performance|stamina).*"
        - type: Not
          criteria:
            type: Or
            criteria:
              - type: SubjectPattern
                pattern: "(?i).{0,100}(financial|investment|portfolio|quarterly|annual|report|update|metric|business|review|2025|2026|2027|january|february|march|april|may|june|july|august|september|october|november|december|q1|q2|q3|q4).*"
              - type: FromDomain
                domains: ["arrived.com", "arrivedhomes.com"]
    score: 250
  
  # Financial fraud patterns  
  - name: "Advance Fee Fraud"
    criteria:
      type: SubjectPattern
      pattern: "(?i).{0,100}(private|confidential|urgent.{0,100}proposal|business.{0,100}proposal|inheritance).*"
    score: 300
  
  # Business spam patterns
  - name: "Business Development Spam"
    criteria:
      type: SubjectPattern
      pattern: "(?i).{0,100}(business.{0,100}development|partnership.{0,100}opportunity|investment.{0,100}proposal).*"
    score: 150

  # Stock spam and pump-and-dump schemes
  - name: "Stock Spam and Pump-and-Dump"
    enabled: true
    criteria:
      type: Or
      criteria:
        - type: SubjectPattern
          pattern: "(?i).{0,100}(executive.{0,100}summary|stock.{0,100}pick|hot.{0,100}stock|penny.{0,100}stock|stock.{0,100}alert|trading.{0,100}alert).*"
        - type: And
          criteria:
            - type: Or
              criteria:
                - type: SubjectPattern
                  pattern: "(?i).{0,100}(stock|trading|investment|portfolio).*"
                - type: BodyPattern
                  pattern: "(?i).{0,100}(stock.{0,100}genius|trading.{0,100}genius|investment.{0,100}genius|stock.{0,100}alert|penny.{0,100}stock).*"
            - type: Or
              criteria:
                - type: BodyPattern
                  pattern: "(?i).{0,100}(buy.{0,100}now|act.{0,100}fast|limited.{0,100}time|explosive.{0,100}growth|guaranteed.{0,100}profit).*"
                - type: SenderPattern
                  pattern: ".*@.*(stockgenius|stockalert|pennystocks|tradingalert).*"
    score: 150
    description: "Stock spam, pump-and-dump schemes, and unsolicited financial advice"

  # SEO and web services spam
  - name: "SEO and Web Services Spam"
    enabled: true
    criteria:
      type: Or
      criteria:
        - type: SubjectPattern
          pattern: "(?i).{0,100}(package.{0,100}for.{0,100}keywords|seo.{0,100}package|ranking.{0,100}package|backlink.{0,100}package).*"
        - type: And
          criteria:
            - type: Or
              criteria:
                - type: BodyPattern
                  pattern: "(?i).{0,100}(not.{0,100}ranking.{0,100}high|improve.{0,100}your.{0,100}ranking|seo.{0,100}services|backlink.{0,100}building|keyword.{0,100}optimization).*"
                - type: BodyPattern
                  pattern: "(?i).{0,100}(search.{0,100}engine.{0,100}optimization|google.{0,100}ranking|website.{0,100}ranking|increase.{0,100}traffic).*"
            - type: Or
              criteria:
                - type: BodyPattern
                  pattern: "(?i).{0,100}(looking.{0,100}at.{0,100}your.{0,100}website|realized.{0,100}that.{0,100}despite|not.{0,100}ranking.{0,100}on.{0,100}google).*"
                - type: SubjectPattern
                  pattern: "(?i).{0,100}(keywords|seo|ranking|backlink).*"
    score: 100
    description: "Unsolicited SEO and web services spam"

  # Fake antivirus and security software spam
  - name: "Fake Antivirus and Security Spam"
    enabled: true
    criteria:
      type: And
      criteria:
        - type: Or
          criteria:
            - type: SubjectPattern
              pattern: "(?i).{0,100}(data.{0,100}vulnerable|secure.{0,100}it.{0,100}today|antivirus.{0,100}protection|security.{0,100}software).*"
            - type: HeaderPattern
              header: "From"
              pattern: "(?i).{0,100}(antivirus.{0,100}protection|security.{0,100}software|data.{0,100}protection).*"
        - type: Not
          criteria:
            type: SenderPattern
            pattern: ".*@.*(norton|mcafee|kaspersky|bitdefender|avast|avg|eset|sophos|trendmicro|symantec)\\.(com|net)$"
    score: 125
    description: "Fake antivirus and security software spam from non-legitimate vendors"

  # Medical misinformation - cure claims
  - name: "Unsubstantiated medical cure claims"
    enabled: true
    criteria:
      type: "And"
      criteria:
        - type: "Or"
          criteria:
            - type: "SubjectPattern"
              pattern: "(?i).{0,100}(reverse|cure|heal|eliminate|fix|solve).{0,100}(diabetes|cancer|vitiligo|arthritis|depression|anxiety|pain).*"
            - type: "BodyPattern"
              pattern: "(?i).{0,100}(reverse|cure|heal|eliminate|fix|solve).{0,100}(diabetes|cancer|vitiligo|arthritis|depression|anxiety|pain).*"
        - type: "Or"
          criteria:
            - type: "SubjectPattern"
              pattern: "(?i).{0,100}naturally.*"
            - type: "BodyPattern"
              pattern: "(?i).{0,100}(naturally|without.{0,100}doctor|without.{0,100}prescription|secret.{0,100}method).*"
    score: 120
    description: "Unsubstantiated medical cure claims"

  # Diabetes and blood sugar spam
  - name: "Diabetes and blood sugar misinformation"
    enabled: true
    criteria:
      type: "And"
      criteria:
        - type: "Or"
          criteria:
            - type: "BodyPattern"
              pattern: "(?i).{0,100}(diabetes|blood.{0,100}sugar|pancreas|insulin.{0,100}resistance|diabetic|blood.{0,100}glucose).*"
            - type: "BodyPattern"
              pattern: "(?i).{0,100}\\ba1c\\b.*"
            - type: "SubjectPattern"
              pattern: "(?i).{0,100}(diabetes|blood.{0,100}sugar|a1c|pancreas|insulin.{0,100}resistance|diabetic|blood.{0,100}glucose).*"
        - type: "Not"
          criteria:
            type: "SenderPattern"
            pattern: ".*@.*williams.{0,100}sonoma.*"
        - type: "Not"
          criteria:
            type: "Or"
            criteria:
              - type: "SenderPattern"
                pattern: ".*@.*fidelity.*"
              - type: "SenderPattern"
                pattern: ".*@.*withings.*"
              - type: "SenderPattern"
                pattern: ".*@.*(1800flowers|celebrations|wolfermans|nytimes).*"
    score: 75
    description: "Diabetes and blood sugar misinformation and miracle cure claims"

  # Adult Content Keywords
  - name: "Adult Content Keywords"
    enabled: true
    criteria:
      type: "SubjectPattern"
      pattern: "(?i).{0,100}(adult.{0,100}content|xxx|porn|sex.{0,100}chat|dating.{0,100}site|hookup|escort|webcam.{0,100}girls|adult.{0,100}entertainment|raging.{0,100}hard|male.{0,100}enhancement|get.{0,100}hard|boost.{0,100}performance).*"
    score: 50
    description: "Adult content and dating scam detection"

  # Fake Delivery Notification Scams
  - name: "Fake Delivery Notification"
    enabled: true
    criteria:
      type: And
      criteria:
        - type: Or
          criteria:
            - type: SubjectPattern
              pattern: "(?i).{0,100}(delivery.{0,100}failed|parcel.{0,100}information|package.{0,100}held|shipment.{0,100}delayed|delivery.{0,100}attempt|address.{0,100}verification|incorrect.{0,100}address.{0,100}delivery).*"
            - type: BodyPattern
              pattern: "(?i).{0,100}(delivery.{0,100}failed|incorrect.{0,100}address.{0,100}delivery|verify.{0,100}shipping.{0,100}address|update.{0,100}delivery.{0,100}address|parcel.{0,100}waiting|package.{0,100}undeliverable).*"
        - type: Not
          criteria:
            type: Or
            criteria:
              - type: SenderPattern
                pattern: ".*@.*(usps|fedex|ups|dhl|amazon|ebay|shopify|torrid)\\.(com|gov)$"
              - type: BodyPattern
                pattern: "(?i).{0,100}(delays.{0,100}in.{0,100}shipping.{0,100}or.{0,100}delivery.{0,100}from.{0,100}factors|standard.{0,100}shipping.{0,100}terms).*"
    score: 100
    description: "Fake delivery notification from non-shipping company"

  # Google Translate URL Wrapper Abuse
  - name: "Google Translate Phishing Wrapper"
    enabled: true
    criteria:
      type: BodyPattern
      pattern: "(?i).{0,100}translate\\.google\\.com/translate\\?.*u=.*"
    score: 150
    description: "Phishing URL wrapped in Google Translate to hide destination"

  # Romance Scam Patterns
  - name: "Romance Scam Patterns"
    enabled: true
    criteria:
      type: Or
      criteria:
        - type: "SubjectPattern"
          pattern: "(?i).{0,100}(lonely.{0,100}woman|beautiful.{0,100}girl|meet.{0,100}singles|find.{0,100}love|romance.{0,100}scam|sugar.{0,100}daddy|sugar.{0,100}baby|want.{0,100}to.{0,100}be.{0,100}with.{0,100}you|how.{0,100}about.{0,100}you).*"
        - type: "SubjectPattern"
          pattern: "(?i).{0,100}(woman.{0,100}alone|woman.{0,100}lonely|girls?.*alone|girls?.*lonely|don't.{0,100}want.{0,100}to.{0,100}be.{0,100}alone).*"
    score: 75
    description: "Romance and dating scam patterns"

  # Ukrainian dating spam
  - name: "Ukrainian Dating Spam"
    enabled: true
    criteria:
      type: Or
      criteria:
        - type: "SubjectPattern"
          pattern: "(?i).{0,100}ukrainian.{0,100}(girl|woman|women|ladies|beauty|beauties).*"
        - type: "BodyPattern"
          pattern: "(?i).{0,100}ukrainian.{0,100}(girl|woman|women|ladies|dating|romance).*"
    score: 75
    description: "Ukrainian dating and romance spam"

  # Bayesian Spam Word Patterns
  - name: "Bayesian Spam Word Patterns"
    enabled: true
    criteria:
      type: "And"
      criteria:
        - type: "SubjectPattern"
          pattern: "(?i).{0,100}(free|win|winner|congratulations|urgent|act.{0,100}now|limited.{0,100}time|exclusive|special.{0,100}offer|guaranteed|amazing|incredible|revolutionary).*"
        - type: "Not"
          criteria:
            type: "Or"
            criteria:
              - type: "SenderPattern"
                pattern: ".*@(dominos\\.com|e-offers\\.dominos\\.com|.*\\.dominos\\.com)$"
              - type: "SenderPattern"
                pattern: ".*@(amazon\\.com|.*\\.amazon\\.com|amazonses\\.com)$"
              - type: "SenderPattern"
                pattern: ".*@(paypal\\.com|.*\\.paypal\\.com)$"
              - type: "SenderPattern"
                pattern: ".*@(wolfermans\\.com|.*wolfermans.{0,100}\\.com|.*filtersfast\\.com|.*\\.filtersfast\\.com|.*backerkit\\.com|.*\\.backerkit\\.com)$"
              - type: "SenderPattern"
                pattern: ".*@(.*nextdoor\\.com|suncadia\\.com)$"
              - type: "HeaderPattern"
                header: "List-Unsubscribe"
                pattern: ".*"
    score: 10
    description: "High-probability spam words based on Bayesian analysis"

  # Commerce threats - fake brand surveys
  - name: "Fake brand surveys and contest scams"
    enabled: true
    criteria:
      type: "And"
      criteria:
        - type: "SubjectPattern"
          pattern: "(?i).{0,100}(survey.{0,100}chance.{0,100}win|complete.{0,100}survey.{0,100}win|feedback.{0,100}win|customer.{0,100}survey.{0,100}prize|survey.{0,100}gift|survey.{0,100}reward|survey.{0,100}car.{0,100}kit|survey.{0,100}emergency.{0,100}kit).*"
        - type: "Not"
