          criteria:
            - type: "SubjectPattern"
              pattern: "(?i).{0,100}(you.{0,100}have.{0,100}won|lottery.{0,100}winner|prize.{0,100}notification|congratulations.{0,100}winner|eligible.{0,100}reward).*"
            - type: "BodyPattern"
