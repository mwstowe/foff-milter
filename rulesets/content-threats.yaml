            pattern: ".*@.*(sparkpostmail|sendgrid|mailchimp|constantcontact|amazonses)\\.(com|net)$"
    score: 80
    description: "Fake brand surveys and contest scams"

  # Financial spam patterns
  - name: "Financial opportunity spam"
    enabled: true
    criteria:
      type: "Or"
      criteria:
        - type: "SubjectPattern"
          pattern: "(?i).{0,100}(get.{0,100}rich.{0,100}quick|make.{0,100}money.{0,100}fast|financial.{0,100}freedom|guaranteed.{0,100}income|work.{0,100}from.{0,100}home).*"
