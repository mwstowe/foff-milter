  # From Header Domain Impersonation
  - name: "From Header Domain Impersonation"
    enabled: true
    criteria:
      type: "And"
      criteria:
        - type: "HeaderPattern"
          header: "From"
          pattern: "\"[^\"@]+\\.(com|org|net|gov|edu|mil)\"\\s*<[^@]+@[^>]+>"
        - type: "Not"
          criteria:
            type: "Or"
            criteria:
              - type: "HeaderPattern"
                header: "From"
                pattern: "\"[^\"@]+\"\\s*<[^@]+@.*walgreens\\.(com|net)>"
              - type: "HeaderPattern"
                header: "From"
                pattern: "\"[^\"@]+\"\\s*<[^@]+@.*doordash\\.(com|net)>"
              - type: "HeaderPattern"
                header: "From"
                pattern: "\"[^\"@]+\"\\s*<[^@]+@.*amazon\\.(com|net)>"
              - type: "HeaderPattern"
                header: "From"
                pattern: "\"[^\"@]+\"\\s*<[^@]+@.*microsoft\\.(com|net)>"
              - type: "HeaderPattern"
                header: "From"
                pattern: "\"[^\"@]+\"\\s*<[^@]+@.*mailchimp.{0,100}\\.(com|net)>"
              - type: "HeaderPattern"
                header: "From"
                pattern: "\"[^\"@]+\"\\s*<[^@]+@.*mcdlv\\.(com|net)>"
              - type: "HeaderPattern"
                header: "From"
                pattern: "\"[^\"@]+\"\\s*<[^@]+@.*sendgrid\\.(com|net)>"
              - type: "HeaderPattern"
                header: "From"
                pattern: "\"[^\"@]+\"\\s*<[^@]+@.*e\\.williams-sonoma\\.com>"
              - type: "HeaderPattern"
                header: "From"
                pattern: "\"499inks\\.com\"\\s*<[^@]+@499inks\\.com>"
        - type: "Or"
          criteria:
            - type: "BodyPattern"
              pattern: "(?i)(password|account|login|verify|confirm|suspend|expir|action.{0,100}required)"
            - type: "SubjectPattern"
              pattern: "(?i)(action.{0,100}required|urgent|expir|suspend|verify|password)"
    score: 90
    description: "From header displays domain name in quotes with completely different sender domain"

  # Password Expiration Phishing
  - name: "Password Expiration Phishing"
    enabled: true
    criteria:
      type: "And"
      criteria:
        - type: "Or"
          criteria:
            - type: "SubjectPattern"
              pattern: "(?i).{0,100}(password.{0,100}expir|password.{0,100}reset|account.{0,100}expir|login.{0,100}expir|access.{0,100}expir).*"
            - type: "BodyPattern"
              pattern: "(?i).{0,100}(password.{0,100}expir|password.{0,100}reset|account.{0,100}expir|login.{0,100}expir|access.{0,100}expir).*"
