              pattern: "(?i).{0,100}(payment|invoice|order|receipt|transaction|billing|purchase).*"
            - type: CombinedTextPattern
              pattern: "(?i).{0,100}(payment.{0,100}received|order.{0,100}confirmed|invoice.{0,100}attached|transaction.{0,100}complete).*"
        - type: Not
          criteria:
            type: Or
            criteria:
              - type: SenderPattern
                pattern: ".*@.*(bursar|finance|accounting|treasurer|payment|billing).{0,100}\\.(gov|edu|mil)"
              - type: SubjectPattern
                pattern: "(?i).{0,100}(tuition|student.{0,100}account|university.{0,100}bill|campus.{0,100}card).*"
    score: 80
    description: "Institutional domains sending commercial/payment content"

  # Young Domain Random Sender
  - name: "Young Domain Random Sender"
    enabled: true
    criteria:
      type: And
      criteria:
        - type: SenderPattern
          pattern: ".*[a-z]{12,}@.*"
        - type: Not
          criteria:
            type: Or
            criteria:
              - type: SenderPattern
                pattern: ".*@.*(noreply|no-reply|newsletter|info|support|contact|hello|team|notification|updates|marketing|investments|communications|services|myairsupport|reservations|notifications|accounts).*"
              - type: SenderPattern
                pattern: ".*@.*(sendgrid|mailchimp|mailgun|amazonses|sparkpost|mandrill|fidelity|amazon|disney|iheart|britishairways|cdw|msgfocus|thinkgeek|concurcompleat|vacuums|emailsp|resmed|kickstarter|waltdisneypictures|disneyplus|emsend|bmsend|14westmail|portlandnursery|americanmeadows|constantcontact|ccsend)\\.(com|net)$"
              - type: SenderPattern
                pattern: ".*@bounce\\.(crm\\.ba|cdwemail|emailsp)\\.(com|net)$"
              - type: SenderPattern
                pattern: ".*@.*(gov|edu|mil|org)$"
              - type: SenderPattern
                pattern: ".*@mail\\.(fidelity|amazon|disney|britishairways|cdw|iheart)\\.(com|net)$"
    score: 80
    description: "Random-looking sender address (12+ consecutive lowercase letters)"

  # Institutional Domain Generic Business Display
  - name: "Institutional Domain Generic Business Display"
    enabled: true
    criteria:
      type: And
      criteria:
        - type: Or
          criteria:
            - type: SenderPattern
              pattern: ".*@.*\\.(gov|edu|mil|istruzioneer)\\."
            - type: SenderPattern
              pattern: ".*@.*\\.(gov|edu|mil)$"
        - type: HeaderPattern
          header: "From"
          pattern: "(?i).{0,100}(CUSTOMER SYSTEMS|BILLING DEPT|PAYMENT CENTER|ACCOUNT SERVICES|CUSTOMER SERVICE|SUPPORT TEAM|NOTIFICATION CENTER|SECURITY TEAM|VERIFICATION DEPT).*"
        - type: Not
          criteria:
            type: SenderPattern
            pattern: ".*@.*(customer|billing|payment|support|service|help).{0,100}\\.(gov|edu|mil)"
    score: 170
    description: "Institutional domain with generic corporate display name"
