              - type: SenderPattern
                pattern: ".*@.*(charmtracker|acemed|acemedseattle|healthcare|medical|clinic|hospital)\\.(com|net|org)$"
              - type: SenderPattern
                pattern: ".*@.*(nytimes|washingtonpost|cnn|bbc|reuters|ap|wsj|usatoday)\\.(com|org)$"
              - type: HeaderPattern
                header: "Authentication-Results"
                pattern: "dkim=pass.{0,100}fidelity\\.com"
              - type: BodyPattern
                pattern: "(?i).{0,100}(401k|401\\(k\\)|retirement.{0,100}plan|employee.{0,100}benefits|plan.{0,100}information.{0,100}documents).*"
    score: 100
