  # Payment Service Abuse
  - name: "Payment Service Abuse"
    enabled: true
    criteria:
      type: "And"
      criteria:
        - type: "SubjectPattern"
          pattern: "(?i).{0,100}(paypal.{0,100}payment|stripe.{0,100}payment|square.{0,100}payment|payment.{0,100}received|money.{0,100}sent|invoice.{0,100}paid|transaction.{0,100}complete|refund.{0,100}processed).*"
