name: "Phishing Threats"
enabled: true
rules:
  # HR/BEC Document Sharing (+200 points)
  - name: "HR Document Sharing Phishing"
    enabled: true
    criteria:
      type: "And"
      criteria:
        - type: "Or"
          criteria:
            - type: "SubjectPattern"
              pattern: "(?i).{0,100}(hr.{0,100}shared|hr.{0,100}document|salary.{0,100}review|incentive.{0,100}overview|payroll.{0,100}update|employee.{0,100}handbook).*"
            - type: "CombinedTextPattern"
              pattern: "(?i).{0,100}(hr.{0,100}department.{0,100}shared|view.{0,100}salary.{0,100}document|access.{0,100}payroll.{0,100}information|employee.{0,100}benefits.{0,100}update).*"
        - type: "Not"
          criteria:
            type: "SenderPattern"
            pattern: ".*@.*(company\\.com|organization\\.org|legitimate\\.edu)$"
    score: 200
    description: "Business Email Compromise targeting HR/payroll documents"

  # Critical Phishing Patterns (+300 points)
  - name: "Critical Phishing Patterns"
    enabled: true
    criteria:
      type: "And"
      criteria:
        - type: "Or"
          criteria:
            - type: "SubjectPattern"
              pattern: "(?i).*(urgent.{0,30}action.{0,30}required|account.{0,30}will.{0,30}be.{0,30}closed|verify.{0,30}immediately|suspended.{0,30}account|click.{0,30}here.{0,30}now).*"
            - type: "CombinedTextPattern"
              pattern: "(?i).*(verify.{0,30}your.{0,30}account.{0,30}now|click.{0,30}here.{0,30}to.{0,30}verify|account.{0,30}has.{0,30}been.{0,30}suspended|immediate.{0,30}action.{0,30}required).*"
            - type: "CombinedTextPattern"
              pattern: "(?i).*(congratulations.{0,30}you.{0,30}have.{0,30}won|claim.{0,30}your.{0,30}prize.{0,30}now|limited.{0,30}time.{0,30}offer.{0,30}expires|act.{0,30}now.{0,30}or.{0,30}lose).*"
        - type: "Not"
          criteria:
            type: "SenderPattern"
            pattern: ".*@.*(nytimes|washingtonpost|cnn|bbc|reuters|ap|wsj|usatoday)\\.(com|org)$"
    score: 300
    description: "High-urgency phishing language patterns"

  # Confirmation Request Phishing (+100 points)
  - name: "Confirmation Request Phishing"
    enabled: true
    criteria:
      type: And
      criteria:
        - type: SubjectPattern
          pattern: "(?i).{0,100}(can.{0,100}you.{0,100}confirm|please.{0,100}confirm|confirm.{0,100}you.{0,100}received|did.{0,100}you.{0,100}receive).*"
        - type: Not
          criteria:
            type: SenderPattern
            pattern: ".*@.*(paypal|amazon|ebay|microsoft|google|apple|chase|wellsfargo|bankofamerica|citi|walgreens|capitaloneshopping|michaels|lowes|homedepot|target|walmart)\\.(com|org)$"
    score: 100
    description: "Suspicious confirmation requests from unknown senders"

  # Financial Phishing (+250 points)
  - name: "Financial Phishing"
    enabled: true
    criteria:
      type: And
      criteria:
        - type: Or
          criteria:
            - type: SubjectPattern
              pattern: "(?i).{0,100}(payment.{0,100}(failed|declined|method.{0,100}declined)|card.{0,100}declined|account.{0,100}overdrawn|suspicious.{0,100}activity|fraud.{0,100}alert).*"
            - type: CombinedTextPattern
              pattern: "(?i).{0,100}(update.{0,100}payment.{0,100}method|verify.{0,100}card.{0,100}information|confirm.{0,100}bank.{0,100}details|resolve.{0,100}payment.{0,100}issue).*"
            - type: CombinedTextPattern
              pattern: "(?i).{0,100}(refund.{0,100}pending|tax.{0,100}refund.{0,100}available|stimulus.{0,100}payment|government.{0,100}benefit).*"
        - type: Not
          criteria:
            type: Or
            criteria:
              - type: SenderPattern
                pattern: ".*@.*(adapthealth|healthcare|medical|clinic|hospital|pulmonary)\\.(com|net|org)$"
              - type: SenderPattern
                pattern: ".*@.*(wine|wines|winery|brewery|distillery|spirits|liquor|beverage).{0,100}\\.(com|net|org)$"
              - type: SenderPattern
                pattern: ".*@.*(evgo|sparkpostmail|acemedseattle|americanmeadows)\\.(com|net)$"
              - type: HeaderPattern
                header: "Authentication-Results"
                pattern: "dkim=pass.{0,100}adapthealth\\.com"
    score: 250
    description: "Financial fraud and payment scam detection"

  # Security Alert Phishing (+200 points)
  - name: "Security Alert Phishing"
    enabled: true
    criteria:
      type: "And"
      criteria:
        - type: "Or"
          criteria:
            - type: "SubjectPattern"
              pattern: "(?i).{0,100}(security.{0,100}alert|suspicious.{0,100}login|unauthorized.{0,100}access|breach.{0,100}detected|virus.{0,100}found).*"
            - type: "SubjectPattern"
              pattern: "(?i).{0,100}(high-severity.{0,100}alert|critical.{0,100}alert|urgent.{0,100}security|account.{0,100}changes).*"
            - type: "CombinedTextPattern"
              pattern: "(?i).{0,100}(your.{0,100}computer.{0,100}infected|malware.{0,100}detected|security.{0,100}scan.{0,100}required|update.{0,100}antivirus).*"
            - type: "CombinedTextPattern"
              pattern: "(?i).{0,100}(microsoft.{0,100}security|windows.{0,100}defender|apple.{0,100}security|google.{0,100}security).*"
            - type: "CombinedTextPattern"
              pattern: "(?i).{0,100}(recent.{0,100}changes.{0,100}to.{0,100}account|verify.{0,100}account.{0,100}immediately|suspicious.{0,100}activity.{0,100}detected).*"
        - type: "Not"
          criteria:
            type: "Or"
            criteria:
              - type: "SenderPattern"
                pattern: ".*@.*(sense|united|netflix|amazon|apple|google|microsoft|paypal|chase|bankofamerica|wellsfargo|fidelity)\\.(com|net)$"
              - type: "HeaderPattern"
                header: "Authentication-Results"
                pattern: "dmarc=pass"
    score: 200
    description: "Fake security alerts and tech support scams"

  # Invoice/Receipt Phishing (+150 points)
  - name: "Invoice Receipt Phishing"
    enabled: true
    criteria:
      type: And
      criteria:
        - type: Or
          criteria:
            - type: SubjectPattern
              pattern: "(?i).{0,100}(invoice.{0,100}attached|receipt.{0,100}confirmation|payment.{0,100}due|billing.{0,100}statement).*"
            - type: CombinedTextPattern
              pattern: "(?i).{0,100}(view.{0,100}invoice|download.{0,100}receipt|payment.{0,100}overdue|billing.{0,100}inquiry).*"
        - type: Not
          criteria:
            type: Or
            criteria:
              - type: SenderPattern
                pattern: ".*@.*(adapthealth|healthcare|medical|clinic|hospital|pulmonary|evergreentlc|netsuite|builtsquare)\\.(com|net|org)$"
              - type: SenderPattern
                pattern: ".*gandiroofingsolutions@gmail\\.com$"
              - type: SenderPattern
                pattern: ".*@.*sendgrid\\.net$"
              - type: HeaderPattern
                header: "Authentication-Results"
                pattern: "dkim=pass.{0,100}adapthealth\\.com"
    score: 150
    description: "Fake invoice and receipt phishing attempts"

  # Financial Phishing
  - name: "Financial Phishing"
    enabled: true
    criteria:
      type: And
      criteria:
        - type: Or
          criteria:
            - type: SubjectPattern
              pattern: "(?i).{0,100}(payment.{0,100}failed|account.{0,100}suspended|verify.{0,100}account|update.{0,100}payment|billing.{0,100}issue).*"
            - type: BodyPattern
              pattern: "(?i).{0,100}(click.{0,100}here.{0,100}verify|update.{0,100}billing|payment.{0,100}method|account.{0,100}locked).*"
        - type: Not
          criteria:
            type: Or
            criteria:
              - type: SenderPattern
                pattern: ".*@.*(paypal|stripe|square|quickbooks|freshbooks|xfinity|comcast|barnesandnoble|williams-sonoma|499inks|americanmeadows)\\.(com|net|org)$"
              - type: SenderPattern
                pattern: ".*@.*(alerts\\.comcast|alerts\\.xfinity)\\.(com|net)$"
              - type: SenderPattern
                pattern: ".*@gmail\\.com$"
              - type: SenderPattern
                pattern: ".*@.*(adapthealth|healthcare|medical|clinic|hospital|pulmonary)\\.(com|net|org)$"
              - type: SenderPattern
                pattern: ".*@.*(wine|wines|winery|brewery|distillery|spirits|liquor|beverage).{0,100}\\.(com|net|org)$"
              - type: And
                criteria:
                  - type: "FeatureAnalysis"
                    feature_name: "Authentication Analysis"
                    evidence_pattern: "DKIM authentication passed"
                  - type: "FeatureAnalysis"
                    feature_name: "Authentication Analysis"
                    evidence_pattern: "SPF authentication passed"
              - type: HeaderPattern
                header: "Authentication-Results"
                pattern: "dkim=pass.{0,100}adapthealth\\.com"
              - type: FeatureAnalysis
                feature_name: "Authentication Analysis"
                evidence_pattern: "DKIM domain properly aligned"
    score: 150
    description: "Financial phishing attempts"

  # Senior-Targeted Shopping Scams (+150 points)
  - name: "Senior-Targeted Shopping Scams"
    enabled: true
    criteria:
      type: And
      criteria:
        - type: Or
          criteria:
            - type: SenderPattern
              pattern: ".*@.*(senior|elderly|mature|age|retirement).{0,100}shopping.{0,100}\\.(com|net|org)$"
            - type: SenderPattern
              pattern: ".*@.*senior.{0,100}(tips|deals|savings|discounts).{0,100}\\.(com|net|org)$"
            - type: SubjectPattern
              pattern: "(?i).{0,100}(deals.{0,100}good.{0,100}don.{0,100}wait|tap.{0,100}now.{0,100}thank|senior.{0,100}discount|age.{0,100}qualified).*"
        - type: Or
          criteria:
            - type: CombinedTextPattern
              pattern: "(?i).{0,100}(tap.{0,100}now|click.{0,100}here.{0,100}save|limited.{0,100}time.{0,100}seniors|exclusive.{0,100}age|retirement.{0,100}deals).*"
            - type: SubjectPattern
              pattern: "(?i).{0,100}(urgent.{0,100}deal|act.{0,100}now.{0,100}save|don.{0,100}wait|hurry.{0,100}limited).*"
    score: 150
    description: "Shopping scams targeting senior citizens with urgency tactics"

  # Cloud Storage Phishing (+100 points)
