    score: 175
    description: "Fake DocuSign and document signing phishing"

  # WeTransfer Phishing (+125 points)
  - name: "WeTransfer Phishing"
    enabled: true
    criteria:
      type: "And"
      criteria:
        - type: "Or"
          criteria:
            - type: "SubjectPattern"
              pattern: "(?i).{0,100}(wetransfer|file.{0,100}transfer|download.{0,100}files|transfer.{0,100}expires).*"
