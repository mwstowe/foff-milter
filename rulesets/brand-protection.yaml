name: "Brand Protection"
enabled: true
rules:
  # Suspicious TLD Promotional Content
  - name: "Suspicious TLD Promotional Content"
    enabled: true
    criteria:
      type: And
      criteria:
        - type: SenderPattern
          pattern: ".*@.*\\.(autos|shop|online|site|store|xyz|top|click|win|bid)$"
        - type: Or
          criteria:
            - type: SubjectPattern
              pattern: "(?i).{0,100}(tough|tactical|survival|adventure|gear|equipment|deal|offer|discount|save|free shipping|limited stock|exclusive).*"
            - type: BodyPattern
              pattern: "(?i).{0,100}(shop now|order now|buy now|limited stock|exclusive offer|click here to shop).*"
        - type: Not
          criteria:
            type: SenderPattern
            pattern: ".*@.*(sendgrid|mailchimp|klaviyo|amazonses|sparkpost|mailgun)\\.(com|net)$"
    score: 40
    description: "Promotional content from suspicious TLD (not legitimate ESP)"

  # Brand Name in Sender Address from Non-Brand Domain
  - name: "Brand Name in Sender Address from Non-Brand Domain"
    enabled: true
    criteria:
      type: And
      criteria:
        - type: HeaderPattern
          header: "From"
          pattern: "(?i).{0,100}(carshield|geico|progressive|allstate|statefarm|liberty.{0,100}mutual).*@.*"
        - type: Not
          criteria:
            type: SenderPattern
            pattern: ".*@.*(carshield|geico|progressive|allstate|statefarm|libertymutual)\\.(com|net)$"
    score: 75
    description: "Insurance brand name in sender address but from non-brand domain"

  # Suspicious Forwarding Domain
  - name: "Suspicious Forwarding Domain"
    enabled: true
    criteria:
      type: And
      criteria:
        - type: HeaderPattern
          header: "Return-Path"
          pattern: ".*@tzkefeng\\.com.*"
        - type: Not
          criteria:
            type: HeaderPattern
            header: "From"
            pattern: ".*@tzkefeng\\.com.*"
    score: 75
    description: "Email forwarded through suspicious domain (tzkefeng.com) with domain mismatch"

  # Young Domain Suspicious Content
  - name: "Young Domain Suspicious Content"
    enabled: true
    criteria:
      type: And
      criteria:
        - type: DomainAge
          max_age_days: 90
          check_sender: true
          timeout_seconds: 5
        - type: Or
          criteria:
            - type: SubjectPattern
              pattern: "(?i).{0,100}(urgent|limited.{0,100}(time|spots?|offer)|act.{0,100}now|expires?|before.{0,100}ends|claim|verify|confirm|update.{0,100}account|suspended|locked|unusual.{0,100}activity|security.{0,100}alert).*"
            - type: SubjectPattern
              pattern: "(?i).{0,100}(prize|winner|congratulations|free.{0,100}gift|exclusive.{0,100}offer|special.{0,100}deal|protect.{0,100}your).*"
        - type: Not
          criteria:
            type: Or
            criteria:
              - type: SenderPattern
                pattern: ".*@.*(sendgrid|mailchimp|klaviyo|constantcontact|mailgun|sparkpost|postmark|amazonses|adobe|salesforce)\\.(com|net)$"
              - type: SenderPattern
                pattern: ".*@.*(thinkgeek|thinkgeekmail|bcdtravel|britishairways|cdw|vacuums)\\.(com|net)$"
    score: 50
    description: "Young domain (≤90 days) with suspicious urgency or promotional content"

  # Harbor Freight Brand Impersonation
  - name: "Harbor Freight Brand Impersonation"
    enabled: true
    criteria:
      type: And
      criteria:
        - type: Or
          criteria:
            - type: SubjectPattern
              pattern: "(?i).{0,100}(harbor.{0,100}freight|harborfreight).*"
            - type: BodyPattern
              pattern: "(?i).{0,100}(harbor.{0,100}freight|harborfreight).*"
            - type: HeaderPattern
              header: "From"
              pattern: "(?i).{0,100}(harbor.{0,100}freight|harborfreight|harbor@freight).*"
        - type: Not
          criteria:
            type: SenderPattern
            pattern: ".*@.*(harborfreight|hftools)\\.(com|net)$"
    score: 125
    description: "Harbor Freight brand impersonation from non-legitimate domain"

  # Chinese Domain Amazon Impersonation
  - name: "Chinese Domain Amazon Impersonation"
    enabled: true
    criteria:
      type: And
      criteria:
        - type: SenderPattern
          pattern: ".*@.*\\.cn$"
        - type: Or
          criteria:
            - type: SubjectPattern
              pattern: "(?i).{0,100}amazon.*"
            - type: SubjectPattern
              pattern: ".*QW1hem9u.*"  # Base64 encoded "Amazon"
            - type: BodyPattern
              pattern: "(?i).{0,100}amazon.*"
    score: 150
    description: "Chinese domain impersonating Amazon (common phishing pattern)"

  # Feature-Based Brand Impersonation Detection
  - name: "Feature-Based Brand Impersonation"
    enabled: true
    criteria:
      type: "FeatureAnalysis"
      feature_name: "Sender Alignment"
      evidence_pattern: "Brand .* mentioned but sender domain .* not legitimate"
    score: 50
    description: "Brand impersonation detected via sender alignment analysis"

  # HR Document Sharing Phishing (BEC)
  - name: "HR Document Sharing Phishing"
    enabled: true
    criteria:
      type: And
      criteria:
        - type: Or
          criteria:
            - type: SubjectPattern
              pattern: "(?i).{0,100}(hr.{0,100}shared|hr.{0,100}document|salary.{0,100}review|incentive.{0,100}overview|payroll.{0,100}document|employee.{0,100}handbook).*"
            - type: BodyPattern
              pattern: "(?i).{0,100}(hr.{0,100}department|human.{0,100}resources|salary.{0,100}information|payroll.{0,100}details|employee.{0,100}benefits).*"
        - type: Not
          criteria:
            type: Or
            criteria:
              - type: SenderPattern
                pattern: ".*@.*(company\\.com|organization\\.org|legitimate\\.edu)$"
              - type: SenderPattern
                pattern: ".*@.*(govdelivery|public\\.govdelivery|capitaloneshopping)\\.(com|net|org)$"
              - type: SenderPattern
                pattern: ".*@.*(nytimes|washingtonpost|cnn|bbc|reuters|ap|wsj|usatoday|acemedseattle)\\.(com|org)$"
    score: 200
    description: "Business Email Compromise targeting HR/payroll themes"

  # Organization Impersonation
  - name: "Organization Impersonation"
    enabled: true
    criteria:
      type: And
      criteria:
        - type: Or
          criteria:
            - type: SubjectPattern
              pattern: "(?i).{0,100}baddomain\\.com\\s+(hr|it|admin|support|team).*"
            - type: BodyPattern
              pattern: "(?i).{0,100}baddomain\\.com.{0,100}(department|team|staff|employee).*"
        - type: Not
          criteria:
            type: SenderPattern
            pattern: ".*@baddomain\\.com$"
    score: 150
    description: "Domain mismatch impersonation detection"

  # Generic brand impersonation
  - name: "Generic brand impersonation"
    enabled: true
    criteria:
      type: And
      criteria:
        - type: Or
          criteria:
            - type: HeaderPattern
              header: "From"
              pattern: "(?i).{0,100}(paypal|amazon|microsoft|google|apple|netflix|walmart|target|chase|bank.{0,100}america|wells.{0,100}fargo).*"
            - type: SubjectPattern
              pattern: "(?i).{0,100}(paypal|amazon|microsoft|google|apple|netflix|walmart|target|chase|bank.{0,100}america|wells.{0,100}fargo).*"
        - type: Or
          criteria:
            - type: HeaderPattern
              header: "Authentication-Results"
              pattern: "dkim=fail"
            - type: HeaderPattern
              header: "Authentication-Results"
              pattern: "spf=fail"
            - type: And
              criteria:
                - type: Not
                  criteria:
                    type: HeaderPattern
                    header: "Authentication-Results"
                    pattern: "dkim=pass"
                - type: Not
                  criteria:
                    type: Or
                    criteria:
                      - type: BodyPattern
                        pattern: "(?i).{0,100}(apple.{0,100}wallet|google.{0,100}pay|samsung.{0,100}pay|paypal.{0,100}integration|amazon.{0,100}partnership).*"
                      - type: SenderPattern
                        pattern: ".*@.*(discover|chase|citi|amex|wellsfargo|bankofamerica)\\.(com|org)$"
        - type: Not
          criteria:
            type: Or
            criteria:
              - type: SenderPattern
                pattern: ".*@.*(medium|backerkit|joinhoney|williams-sonoma|lovepop|shutterfly|resmed|quora|nytimes)\\.(com|org)$"
              - type: SenderPattern
                pattern: ".*paypal.{0,100}adobe.*"
              - type: SenderPattern
                pattern: ".*@.*sparkpostmail\\.(com|net)$"
              - type: HeaderPattern
                header: "Authentication-Results"
                pattern: "dkim=pass.{0,100}\\.(medium|backerkit|joinhoney|williams-sonoma|lovepop|shutterfly|resmed|quora)\\.(com|org)"
    score: 200
    description: "Brand impersonation with authentication failure (excluding legitimate newsletters)"

  # Known brand from suspicious domain
  - name: "Known brand from suspicious domain"
    enabled: true
    criteria:
      type: "And"
      criteria:
        - type: "Or"
          criteria:
            - type: "HeaderPattern"
              header: "From"
              pattern: "(?i).{0,100}(McDonald's|Netflix|Disney|Starbucks|Walmart|Amazon|Target|Best Buy|Home Depot|Lowe's|CVS|Walgreens|Chase|Bank of America|Wells Fargo|Citi|Capital One|American Express|Discover|PayPal|Venmo|Cash App|Zelle|Apple|Microsoft|Google|Facebook|Instagram|Twitter|LinkedIn|YouTube|TikTok|Snapchat|WhatsApp|Telegram|Zoom|Skype|Slack|Teams|Dropbox|OneDrive|iCloud|Gmail|Yahoo|Outlook|Hotmail|AOL|Comcast|Verizon|AT&T|T-Mobile|Sprint|UPS|FedEx|USPS|DHL|Uber|Lyft|Airbnb|Booking|Expedia|Priceline|Hotels|Marriott|Hilton|Hyatt|IHG|Choice|Wyndham|Radisson|Accor|Four Seasons|Ritz Carlton|Sheraton|Westin|Doubletree|Hampton|Holiday Inn|Courtyard|Residence Inn|SpringHill|Fairfield|TownePlace|Aloft|Element|Moxy|AC Hotels|Autograph|Tribute|Design Hotels|Luxury Collection|St. Regis|W Hotels|Edition|Le Meridien|Renaissance|Delta|Gaylord|Omni|Loews|Kimpton|Joie de Vivre|Thompson|Tommie|Unbound|Tapestry|Curio|DoubleTree|Embassy Suites|Homewood Suites|Home2 Suites|Tru|Canopy|Signia|LXR|Conrad|Waldorf Astoria|Tempo|Graduate|Even|Avid|WoodSpring|MainStay|Candlewood|Staybridge|Extended Stay|Red Roof|Motel 6|Super 8|Days Inn|Ramada|Howard Johnson|Travelodge|Knights Inn|Econo Lodge|Quality Inn|Comfort Inn|Comfort Suites|Sleep Inn|Clarion|Cambria|Ascend|Suburban|WoodSpring|MainStay|Candlewood|Staybridge|Extended Stay|Red Roof|Motel 6|Super 8|Days Inn|Ramada|Howard Johnson|Travelodge|Knights Inn|Econo Lodge|Quality Inn|Comfort Inn|Comfort Suites|Sleep Inn|Clarion|Cambria|Ascend|Suburban).*"
            - type: "SubjectPattern"
              pattern: "(?i).{0,100}(McDonald's|Netflix|Disney|Starbucks|major.{0,100}brand|official.{0,100}notification|customer.{0,100}service|account.{0,100}verification|security.{0,100}alert).*"
        - type: "Not"
          criteria:
            type: "Or"
            criteria:
              - type: "SenderPattern"
                pattern: ".*@.*(mcdonalds|netflix|disney|disneypublishing|starbucks|walmart|amazon|amazonmusic|target|bestbuy|homedepot|lowes|cvs|walgreens|chase|bankofamerica|wellsfargo|citi|capitalone|americanexpress|discover|paypal|venmo|apple|microsoft|google|facebook|instagram|twitter|linkedin|youtube|tiktok|snapchat|whatsapp|telegram|zoom|skype|slack|teams|dropbox|onedrive|icloud|gmail|yahoo|outlook|hotmail|aol|comcast|verizon|att|tmobile|sprint|ups|fedex|usps|dhl|uber|lyft|airbnb|booking|expedia|priceline|hotels|marriott|hilton|hyatt|ihg|choice|wyndham|radisson|accor|fidelity|fidelityinvestments|d23|waltdisneypictures|synchrony|comenity|barclays|geico)\\.(com|org|net)$"
              - type: "SenderPattern"
                pattern: ".*@.*(sparkpostmail|sendgrid|mailchimp|mailchimpapp|amazonses|constantcontact|mailgun|facebookmail|zoomcare|pb-dynmktg|pardot|marketo|eloqua|hubspot|campaignmonitor)\\.(com|net)$"
              - type: "SenderPattern"
                pattern: ".*paypal.{0,100}adobe.*"
              - type: "SenderPattern"
                pattern: ".*@.*iheart\\.(com|net)$"
    score: 150
    description: "Known brand claims from suspicious or unrelated domains"

  # AAA Emergency Kit Scams
  - name: "AAA Emergency Kit Scams"
    enabled: true
    criteria:
      type: And
      criteria:
        - type: "Or"
          criteria:
            - type: "SubjectPattern"
              pattern: "(?i).{0,100}(aaa.{0,100}emergency.{0,100}kit|triple.{0,100}a.{0,100}kit|car.{0,100}emergency.{0,100}kit|safety.{0,100}kit|survival.{0,100}kit).*"
            - type: "BodyPattern"
              pattern: "(?i).{0,100}(aaa.{0,100}member|triple.{0,100}a.{0,100}member|emergency.{0,100}roadside|car.{0,100}breakdown|roadside.{0,100}assistance).*"
            - type: "BodyPattern"
              pattern: "(?i).{0,100}(state.{0,100}farm.{0,100}kit|allstate.{0,100}kit|geico.{0,100}kit|progressive.{0,100}kit).*"
        - type: Not
          criteria:
            type: Or
            criteria:
              - type: SenderPattern
                pattern: ".*@.*nytimes.*"
              - type: SenderPattern
                pattern: ".*@.*(geico|statefarm|allstate|progressive|libertymutual|nationwide|usaa|farmers|travelers|aaa|erie)\\.(com|net|org)$"
    score: 150
    description: "AAA and insurance company emergency kit scams"

  # Microsoft OnMicrosoft Compromise
  - name: "Microsoft OnMicrosoft Compromise"
    enabled: true
    criteria:
      type: "And"
      criteria:
        - type: "SenderPattern"
          pattern: ".*@.*\\.onmicrosoft\\.com$"
        - type: "Or"
          criteria:
            - type: "HeaderPattern"
              header: "Authentication-Results"
              pattern: "dkim=fail"
            - type: "SubjectPattern"
              pattern: "(?i).{0,100}(taste|special|uid[0-9]+|restaurant|food|dining).*"
    score: 100
    description: "Compromised Microsoft tenant domains"

  # Healthcare and Government Impersonation
  - name: "Healthcare Government Impersonation"
    enabled: true
    criteria:
      type: "And"
      criteria:
        - type: "Or"
          criteria:
            - type: "SubjectPattern"
              pattern: "(?i).*(medicare|medicaid|unitedhealthcare|benefits.{0,30}center|veteran.{0,30}affairs).*"
            - type: "BodyPattern"
              pattern: "(?i).*(health.{0,30}insurance|medicare.{0,30}advantage|benefits.{0,30}enrollment|va.{0,30}benefits|health.{0,30}benefits.{0,30}center).*"
            - type: "SubjectPattern"
              pattern: "(?i).*(cvs.{0,30}order|pharmacy.{0,30}confirmation|prescription.{0,30}ready|health.{0,30}plan).*"
        - type: "Not"
          criteria:
            type: "Or"
            criteria:
              - type: "SenderPattern"
                pattern: ".*@.*(cvs|unitedhealthcare|medicare|va|veterans|adapthealth|adapthealthmarketplace|sears|searshomeservices|nytimes|newyorktimes)\\.(com|org|gov)$"
              - type: "BodyPattern"
                pattern: "(?i).*(loyalty.{0,30}program|rewards.{0,30}program|membership.{0,30}benefits|shipping.{0,30}benefits|passport.{0,30}benefits).*"
    score: 175
    description: "Healthcare and government service impersonation"

  # Critical Brand Impersonation
  - name: "Critical Brand Impersonation"
    enabled: true
    criteria:
      type: "And"
      criteria:
        - type: "SenderPattern"
          pattern: "(?i).{0,100}(amazon|apple|microsoft|google|facebook|paypal|aarp|walmart|target|netflix|disney|fedex|ups|visa|chase|bank).*"
        - type: "Or"
          criteria:
            - type: "HeaderPattern"
              header: "Authentication-Results"
              pattern: "dkim=fail"
            - type: "HeaderPattern"
              header: "Authentication-Results"
              pattern: "spf=fail"
        - type: "Not"
          criteria:
            type: "Or"
            criteria:
              - type: "SenderPattern"
                pattern: ".*@.*(sparkpostmail|sendgrid|mailchimp|constantcontact|amazonses|mailgun|klaviyomail|campaignmonitor|aweber)\\.(com|net|org)$"
              - type: "SenderPattern"
                pattern: ".*@.*(amazon|google|microsoft|apple|netflix|walmart|target|disney|fedex|ups|visa|chase)\\.(com|org)$"
              - type: "HeaderPattern"
                header: "From"
                pattern: "(?i).{0,100}(newsletter|digest|marketing|promotional|noreply|no-reply).*"
    score: 300
    description: "Critical: Major brand + authentication failure + domain mismatch"

  # ANA airline impersonation from Chinese domain
  - name: "ANA Airline Impersonation Chinese Domain"
    enabled: true
    criteria:
      type: "And"
      criteria:
        - type: "SenderPattern"
          pattern: ".*@.*\\.cn$"
        - type: "Or"
          criteria:
            - type: "HeaderPattern"
              header: "From"
              pattern: "(?i).{0,100}ana.*"
            - type: "SubjectPattern"
              pattern: ".*ANA.*"
    score: 200
    description: "ANA airline impersonation from Chinese domain"

  # Microsoft tenant Stanley Tools impersonation
  - name: "Microsoft tenant Stanley Tools impersonation"
    enabled: true
    criteria:
      type: "HeaderPattern"
      header: "From"
      pattern: ".*@dailydials19\\.onmicrosoft\\.com.*"
    score: 100
    description: "Brand impersonation from Microsoft tenant"
  # State Farm fire kit impersonation
  - name: "State Farm Fire Kit Impersonation"
    criteria:
      type: Or
      criteria:
        - type: SubjectPattern
          pattern: "(?i).{0,100}(fire.{0,100}doesn.{0,100}t.{0,100}wait.{0,100}neither.{0,100}should.{0,100}you|state.{0,100}farm.{0,100}fire.{0,100}emergency.{0,100}kit|fire.{0,100}kit.{0,100}brand.{0,100}impersonation).*"
        - type: BodyPattern
          pattern: "(?i).{0,100}(fire.{0,100}doesn.{0,100}t.{0,100}wait.{0,100}neither.{0,100}should.{0,100}you|state.{0,100}farm.{0,100}fire.{0,100}emergency.{0,100}kit|fire.{0,100}kit.{0,100}brand.{0,100}impersonation).*"
