  # WeTransfer brand impersonation
  - name: "WeTransfer Brand Impersonation"
    criteria:
      type: Or
      criteria:
        - type: SubjectPattern
          pattern: "(?i).{0,100}(transfer.{0,100}you.{0,100}received.{0,100}expired.{0,100}can.{0,100}still.{0,100}recover|wetransfer.{0,100}brand.{0,100}impersonation|fake.{0,100}wetransfer).*"
        - type: BodyPattern
          pattern: "(?i).{0,100}(transfer.{0,100}you.{0,100}received.{0,100}expired.{0,100}can.{0,100}still.{0,100}recover|wetransfer.{0,100}brand.{0,100}impersonation|fake.{0,100}wetransfer).*"
    score: 300
  # YETI brand impersonation Google Workspace
  - name: "YETI Brand Impersonation Google Workspace"
    criteria:
      type: Or
      criteria:
        - type: SubjectPattern
          pattern: "(?i).{0,100}(yeti.{0,100}outdoor.{0,100}bundle.{0,100}final.{0,100}shipping.{0,100}stage|yeti.{0,100}brand.{0,100}impersonation|fake.{0,100}yeti.{0,100}shipping).*"
        - type: BodyPattern
          pattern: "(?i).{0,100}(yeti.{0,100}outdoor.{0,100}bundle.{0,100}final.{0,100}shipping.{0,100}stage|yeti.{0,100}brand.{0,100}impersonation|fake.{0,100}yeti.{0,100}shipping).*"
    score: 290
  # USA Today brand impersonation
  - name: "USA Today Brand Impersonation"
    criteria:
      type: Or
      criteria:
        - type: SubjectPattern
          pattern: "(?i).{0,100}(usa.{0,100}today.{0,100}automotive.{0,100}aftermarket.{0,100}special.{0,100}edition|usa.{0,100}today.{0,100}brand.{0,100}impersonation|fake.{0,100}usa.{0,100}today).*"
        - type: BodyPattern
          pattern: "(?i).{0,100}(usa.{0,100}today.{0,100}automotive.{0,100}aftermarket.{0,100}special.{0,100}edition|usa.{0,100}today.{0,100}brand.{0,100}impersonation|fake.{0,100}usa.{0,100}today).*"
    score: 280

  # Unrelated Domain Brand Impersonation
  - name: "Unrelated Domain Brand Impersonation"
    enabled: true
    criteria:
      type: Or
      criteria:
        - type: And
          criteria:
            - type: HeaderPattern
              header: "From"
              pattern: "(?i).{0,100}wellaheat.*"
            - type: SenderPattern
              pattern: ".*@sydneyentertainmentcomplex\\.com$"
        - type: SenderPattern
          pattern: ".*@sydneyentertainmentcomplex\\.com$"
    score: 250
    description: "Suspicious domain used for multiple unrelated spam campaigns"

  # Suspicious Shop Domain Health Spam
  - name: "Suspicious Shop Domain Health Spam"
    enabled: true
    criteria:
      type: And
      criteria:
        - type: SenderPattern
          pattern: ".*@.*\\.shop$"
        - type: Or
          criteria:
            - type: SubjectPattern
              pattern: "(?i).{0,100}(japanese.{0,100}candy|joint.{0,100}replacement|surgery|supplement|miracle|health.{0,100}cure|pain.{0,100}relief).*"
            - type: BodyPattern
              pattern: "(?i).{0,100}(japanese.{0,100}candy|joint.{0,100}replacement|surgery|supplement|miracle|health.{0,100}cure|pain.{0,100}relief).*"
    score: 75
